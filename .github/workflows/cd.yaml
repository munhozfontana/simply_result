name: Dart Package CD

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CHANGELOG contains current version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')

          echo "Checking CHANGELOG for version $VERSION"

          if ! grep -q "^## $VERSION" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md does not contain entry for version $VERSION"
            exit 1
          fi

      - name: Verify version matches tag
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG=${GITHUB_REF#refs/tags/v}

          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag version ($TAG) does not match pubspec.yaml ($VERSION)"
            exit 1
          fi

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Publish package
        run: dart pub publish -f
